name: ESLint ROM Manager on PR

on:
  pull_request:
    branches: [master]
    paths:
      - 'retrotrack.rommanager/**'
  push:
    branches: [master]
    paths:
      - 'retrotrack.rommanager/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v3

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci --ignore-scripts
        working-directory: retrotrack.rommanager

      - name: Run ESLint
        run: npm run lint
        working-directory: retrotrack.rommanager
